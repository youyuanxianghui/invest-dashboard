<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>套利仪表盘</title>
<style>
  :root {
    --bg: #0a0e17; --card: #121827; --border: #1e293b;
    --accent: #3b82f6; --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
    --text: #e2e8f0; --muted: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:50px; }
  .header { border-bottom:1px solid var(--border); padding:14px 16px; background:var(--card); position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-size:17px; font-weight:600; background:linear-gradient(135deg,var(--accent),#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .header-time { font-size:12px; color:var(--muted); }
  .cont { padding:14px 12px; max-width:720px; margin:0 auto; }
  .sec { font-size:14px; font-weight:600; margin:20px 0 10px; display:flex; align-items:center; gap:8px; }
  .sec .bc { font-size:11px; background:var(--accent); color:#fff; padding:1px 8px; border-radius:8px; font-weight:400; }
  .c { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; }
  .rw { display:flex; justify-content:space-between; align-items:center; }
  .lb { font-size:12px; color:var(--muted); }
  .vl { font-size:20px; font-weight:700; }
  .sb { font-size:12px; margin-top:3px; }
  .gn { color:var(--green); } .rd { color:var(--red); } .og { color:var(--orange); } .mu { color:var(--muted); }
  .ld { text-align:center; padding:24px; color:var(--muted); font-size:13px; }
  .ftr { text-align:center; padding:16px; color:var(--muted); font-size:11px; margin-top:20px; line-height:1.7; }
  /* repo */
  .repo { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; }
  .repo.high { border-color:var(--orange); background:rgba(245,158,11,0.08); }
  .repo .rr { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .repo .rate { font-size:22px; font-weight:700; }
  .repo .badge { font-size:11px; background:var(--orange); color:#1a1205; padding:2px 8px; border-radius:8px; font-weight:700; }
  .repo .note { font-size:11px; color:var(--muted); margin-top:6px; }
  /* arb summary */
  .sum { font-size:12px; color:var(--muted); margin:-2px 0 10px; }
  .sum b { color:var(--text); }
  .grp-h { font-size:13px; font-weight:600; margin:14px 0 8px; color:var(--text); display:flex; align-items:center; gap:8px; }
  .grp-c { font-size:11px; background:var(--border); color:var(--muted); padding:1px 8px; border-radius:8px; font-weight:400; }
  /* opportunity card */
  .opp { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; }
  .opp-h { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .opp-n { font-weight:600; font-size:14px; }
  .opp-c { font-size:11px; color:var(--muted); }
  .tag { font-size:10px; padding:1px 6px; border-radius:4px; }
  .tag.qdii { background:rgba(59,130,246,0.12); color:var(--accent); }
  .tag.lof { background:rgba(100,116,139,0.14); color:var(--muted); }
  .tag.close { background:rgba(245,158,11,0.12); color:var(--orange); }
  .dir { font-size:10px; padding:1px 7px; border-radius:4px; font-weight:600; margin-left:auto; }
  .dir.premium { background:rgba(239,68,68,0.12); color:var(--red); }
  .dir.discount { background:rgba(34,197,94,0.12); color:var(--green); }
  .dir.close { background:rgba(245,158,11,0.12); color:var(--orange); }
  .opp-b { display:flex; align-items:flex-end; gap:12px; margin-top:8px; }
  .opp-pct { font-size:22px; font-weight:700; line-height:1; }
  .opp-pct.pr { color:var(--orange); }
  .opp-pct.dc { color:var(--green); }
  .opp-meta { font-size:12px; color:var(--muted); line-height:1.6; flex:1; }
  .opp-meta b { color:var(--text); font-weight:600; }
  /* cb */
  .cb { padding:14px; border-radius:10px; background:var(--card); border:1px solid var(--border); margin-bottom:8px; }
  .cb-n { font-weight:600; font-size:14px; }
  .cb-d { font-size:12px; color:var(--muted); margin-top:2px; line-height:1.5; }
  .cb-t { font-size:11px; color:var(--muted); background:rgba(59,130,246,0.05); padding:8px; border-radius:6px; margin-top:8px; }
  .ct { font-size:11px; padding:2px 6px; border-radius:4px; }
  .ct.r2 { background:rgba(239,68,68,0.08); color:var(--red); }
  .ct.r1 { background:rgba(245,158,11,0.08); color:var(--orange); }
  .ct.r0 { background:rgba(34,197,94,0.08); color:var(--green); }
</style>
</head>
<body>

<div class="header">
  <h1>📊 套利仪表盘</h1>
  <span class="header-time" id="ht">加载中...</span>
</div>

<div class="cont">

  <!-- 大盘 -->
  <div class="sec">📈 上证指数 <span class="bc">市场温度</span></div>
  <div class="c">
    <div class="rw"><span class="lb">实时指数</span><span class="vl" id="ip">--</span></div>
    <div class="rw" style="margin-top:4px;"><span class="sb" id="ic"></span><span class="sb mu" id="it"></span></div>
  </div>

  <!-- 每日套利机会 -->
  <div class="sec">🎯 每日套利机会 <span class="bc">LOF · QDII · 封闭</span></div>
  <div class="sum" id="arbSum">扫描中...</div>
  <div id="arbList"><div class="ld">加载中</div></div>

  <!-- 逆回购 -->
  <div class="sec">📈 逆回购利率 <span class="bc">闲置资金</span></div>
  <div id="repoBox"><div class="repo"><div class="ld" style="padding:12px;">加载中</div></div></div>

  <!-- 待发可转债 -->
  <div class="sec">🎯 待发可转债（打新）</div>
  <div id="cbUpdated" class="lb" style="margin:-4px 0 8px;font-size:11px;"></div>
  <div id="cbList"><div class="ld">加载中</div></div>

</div>

<div class="ftr">
  数据：腾讯行情 · 天天基金 · 东方财富 &nbsp;|&nbsp; 溢价率=现价/净值-1（净值取最新可得）<br>
  套利有成本与风险，本页仅供参考，非投资建议
</div>

<script>
const REPO_HIGH = 3.0; // 逆回购"走高"阈值(%)

async function load() {
  renderIndex();
  await Promise.all([renderArb(), renderCB()]);
  renderRepo();
  document.getElementById('ht').textContent = new Date().toLocaleTimeString('zh-CN', {hour12:false}) + ' ✓';
}

// ===== 上证指数 =====
async function renderIndex() {
  try {
    var r = await fetch('https://qt.gtimg.cn/q=sh000001');
    var t = await r.text();
    var m = t.match(/v_sh000001="([^"]+)"/);
    if (m) {
      var p = m[1].split('~');
      document.getElementById('ip').textContent = parseFloat(p[3]).toFixed(2);
      var ch = parseFloat(p[31]), cp = p[32];
      var c2 = ch >= 0 ? 'gn' : 'rd';
      var a2 = ch >= 0 ? '▲' : '▼';
      document.getElementById('ic').innerHTML = '<span class="' + c2 + '">' + a2 + ' ' + ch.toFixed(2) + ' (' + cp + '%)</span>';
      document.getElementById('it').textContent = p[30] ? p[30].slice(0,4)+'-'+p[30].slice(4,6)+'-'+p[30].slice(6,11) : '';
    }
  } catch(e) {}
}

// ===== 每日套利机会 =====
async function renderArb() {
  var el = document.getElementById('arbList');
  var sum = document.getElementById('arbSum');
  try {
    var r = await fetch('./data/arb.json', { cache: 'no-cache' });
    if (!r.ok) throw new Error('http ' + r.status);
    var d = await r.json();
    var list = d.opportunities || [];
    var cnt = function(t){ return list.filter(function(o){return o.type===t;}).length; };
    sum.innerHTML = '扫描 <b>' + (d.universe||0) + '</b> 只 · QDII机会 <b>' + cnt('qdii') + '</b> · LOF机会 <b>' + cnt('lof') + '</b> · 封基折价 <b>' + cnt('close') + '</b> &nbsp;·&nbsp; ' + (d.updated||'');
    if (!list.length) { el.innerHTML = '<div class="ld">今日无明显套利机会，保持关注 🔍</div>'; return; }
    var groups = [
      { key:'qdii', label:'🌐 QDII-LOF（跨境/原油/美股）' },
      { key:'lof',  label:'📦 国内 LOF' },
      { key:'close', label:'🔒 封闭/定开（分类）基金' }
    ];
    var html = '';
    groups.forEach(function(g) {
      var items = list.filter(function(o){ return o.type === g.key; });
      if (!items.length) return;
      html += '<div class="grp-h">' + g.label + ' <span class="grp-c">' + items.length + '</span></div>';
      items.forEach(function(o){ html += oppCard(o); });
    });
    el.innerHTML = html;
  } catch (e) {
    sum.textContent = '';
    el.innerHTML = '<div class="ld">数据加载失败，稍后重试</div>';
  }
}

function oppCard(o) {
  var tagCls = o.type === 'qdii' ? 'qdii' : (o.type === 'close' ? 'close' : 'lof');
  var tagTxt = o.type === 'qdii' ? 'QDII-LOF' : (o.type === 'close' ? '封闭' : 'LOF');
  var dirCls = o.dir;
  var dirTxt = o.dir === 'premium' ? '溢价·申购卖' : (o.dir === 'discount' ? '折价·买入赎' : '封基折价·持有');
  var pctCls = o.dir === 'discount' ? 'dc' : 'pr';
  var pctTxt = (o.premiumPct >= 0 ? '+' : '') + o.premiumPct.toFixed(2) + '%';
  var spaceCls = o.space >= 0 ? 'gn' : 'rd';
  var navDate = (o.navDate||'').slice(0,10);
  var amt = o.amountWan != null ? (o.amountWan >= 10000 ? (o.amountWan/10000).toFixed(2)+'亿' : Math.round(o.amountWan)+'万') : '—';
  return '<div class="opp">'
    + '<div class="opp-h"><span class="opp-n">' + o.name + '</span><span class="opp-c">' + o.code + '</span>'
    + '<span class="tag ' + tagCls + '">' + tagTxt + '</span>'
    + '<span class="dir ' + dirCls + '">' + dirTxt + '</span></div>'
    + '<div class="opp-b">'
    + '<div class="opp-pct ' + pctCls + '">' + pctTxt + '</div>'
    + '<div class="opp-meta">'
    + '现价 <b>' + (o.price!=null?o.price.toFixed(3):'—') + '</b> · 净值 <b>' + (o.nav!=null?o.nav.toFixed(4):'—') + '</b>(' + navDate + ')<br>'
    + '预估空间 <b class="' + spaceCls + '">' + (o.space>=0?'+':'') + o.space.toFixed(2) + '%</b> · 成交 ' + amt + ' · 操作：' + o.action
    + '</div></div></div>';
}

// ===== 逆回购（实时）=====
function rateOf(t) {
  var m = t.match(/v_\w+="([^"]+)"/);
  if (!m) return null;
  var p = m[1].split('~');
  return parseFloat(p[3]);
}
async function renderRepo() {
  var box = document.getElementById('repoBox');
  var gc = null, r0 = null;
  try {
    var [g, c] = await Promise.all([
      fetch('https://qt.gtimg.cn/q=sh204001'),
      fetch('https://qt.gtimg.cn/q=sz131810')
    ]);
    gc = rateOf(await g.text());
    r0 = rateOf(await c.text());
  } catch(e) {}
  // 实时失败则用快照
  if (gc == null || isNaN(gc)) {
    try {
      var snap = await (await fetch('./data/arb.json', {cache:'no-cache'})).json();
      if (snap.repo) { gc = snap.repo.gc001; r0 = snap.repo.r001; }
    } catch(e) {}
  }
  if (gc == null) { box.innerHTML = '<div class="repo"><div class="ld" style="padding:12px;">逆回购暂不可用</div></div>'; return; }
  var high = gc >= REPO_HIGH || (r0 != null && r0 >= REPO_HIGH);
  var rateTxt = gc.toFixed(2) + '%';
  var rTxt = r0 != null ? (' · R-001 <b>' + r0.toFixed(2) + '%</b>') : '';
  var badge = high ? '<span class="badge">利率走高 ⚠️ 可考虑参与</span>' : '';
  box.innerHTML = '<div class="repo' + (high?' high':'') + '">'
    + '<div class="rr"><span class="rate">' + rateTxt + '</span><span class="mu" style="font-size:13px;">GC001' + rTxt + '</span>' + badge + '</div>'
    + '<div class="note">季末/节前利率常走高，闲置资金可参与逆回购；阈值 ' + REPO_HIGH + '%</div></div>';
}

// ===== 待发可转债（打新）=====
async function renderCB() {
  var el = document.getElementById('cbList');
  try {
    var r = await fetch('./data/cb_upcoming.json', { cache: 'no-cache' });
    if (!r.ok) throw new Error('http ' + r.status);
    var data = await r.json();
    var list = (data && data.list) || [];
    document.getElementById('cbUpdated').textContent = data.updated ? ('数据更新：' + data.updated) : '';
    if (!list.length) { el.innerHTML = '<div class="ld">近期无新债申购，保持关注 🎉</div>'; return; }
    var now = new Date();
    var html = '';
    list.forEach(function(b) {
      var d = b.subDate ? new Date(b.subDate.replace(/-/g, '/')) : null;
      var diff = d ? Math.round((d - now) / 86400000) : null;
      var tag = '', tagCls = 'mu';
      if (diff === 0) { tag = '今日申购'; tagCls = 'r0'; }
      else if (diff > 0) { tag = '还有 ' + diff + ' 天'; tagCls = 'r1'; }
      else { tag = '已过申购日'; tagCls = 'r2'; }
      html += '<div class="cb">'
        + '<div class="cb-n">' + b.name
        + ' <span style="font-size:11px;color:var(--muted);font-weight:400;">申购 ' + (b.code || '') + '</span>'
        + ' <span class="ct ' + tagCls + '">' + tag + '</span></div>';
      html += '<div class="cb-d">正股：' + (b.stock || '—') + ' · 规模：' + (b.scale || '—') + '亿 · 评级：' + (b.rating || '—')
        + (b.value ? (' · 转股价值：' + b.value) : '') + '</div>';
      html += '<div class="cb-t">📅 申购日：' + (b.subDate || '—').slice(0, 10) + ' · 顶格申购 · 无需预缴款</div>';
      html += '</div>';
    });
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<div class="ld">数据加载失败，稍后重试</div>';
  }
}

window.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
