<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>套利雷达 · 实时监控</title>
<style>
/* ===== 变量 ===== */
:root {
  --bg:       #070b14;
  --bg2:      #0d1424;
  --card:     rgba(13,20,36,0.85);
  --border:   rgba(56,189,248,0.12);
  --border2:  rgba(56,189,248,0.25);
  --accent:   #38bdf8;
  --accent2:  #818cf8;
  --green:    #34d399;
  --red:      #f87171;
  --orange:   #fbbf24;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --glow:     0 0 20px rgba(56,189,248,0.15);
  --glass:    backdrop-filter: blur(20px) saturate(180%);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== 背景 ===== */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
.bg-glow {
  position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
  width: 800px; height: 600px;
  background: radial-gradient(ellipse at center, rgba(56,189,248,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ===== 布局 ===== */
.wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 16px 60px; }

/* ===== 顶栏 ===== */
.header {
  position: sticky; top: 0; z-index: 100;
  padding: 14px 0;
  background: rgba(7,11,20,0.9);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
}
.header-inner { max-width: 900px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; }
.logo-text { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo-sub { font-size: 11px; color: var(--muted); font-weight: 400; }
.header-right { display: flex; align-items: center; gap: 16px; }
.live-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
.last-update { font-size: 12px; color: var(--muted); }

/* ===== 通用卡片 ===== */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 20px;
  margin-bottom: 12px;
  transition: border-color 0.3s;
}
.card:hover { border-color: var(--border2); }
.card-glow { box-shadow: var(--glow); }

/* ===== 标题栏 ===== */
.sec { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sec-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: var(--text); }
.sec-icon { font-size: 16px; }
.sec-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: rgba(56,189,248,0.1); color: var(--accent); border: 1px solid rgba(56,189,248,0.2); font-weight: 500; }

/* ===== 指数网格 ===== */
.indices-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media(max-width:600px){ .indices-grid{grid-template-columns:repeat(2,1fr);} }
.idx-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(56,189,248,0.08); border-radius: 10px; padding: 12px 14px; transition: all 0.2s; cursor: default; }
.idx-card:hover { border-color: rgba(56,189,248,0.25); background: rgba(56,189,248,0.04); }
.idx-name { font-size: 12px; color: var(--muted); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.idx-price { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 4px; }
.idx-change { font-size: 12px; font-weight: 600; }
.up { color: var(--red); }
.dn { color: var(--green); }
.idx-time { font-size: 10px; color: var(--muted); margin-top: 4px; }

/* ===== 套利统计 ===== */
.stat-row { display: flex; gap: 10px; margin-bottom: 14px; }
.stat-card { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(56,189,248,0.08); border-radius: 10px; padding: 12px 14px; text-align: center; }
.stat-val { font-size: 22px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.stat-lbl { font-size: 11px; color: var(--muted); }
.s-premium { color: var(--red); }
.s-discount { color: var(--green); }
.s-close { color: var(--orange); }
.s-total { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* ===== 机会卡片 ===== */
.opp-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(56,189,248,0.08);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.opp-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 3px 0 0 3px;
}
.opp-card.premium::before { background: var(--red); }
.opp-card.discount::before { background: var(--green); }
.opp-card.close::before { background: var(--orange); }
.opp-card:hover { border-color: rgba(56,189,248,0.3); transform: translateX(2px); }

.opp-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
.opp-name { flex: 1; min-width: 0; }
.opp-name-text { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.opp-code { font-size: 11px; color: var(--muted); margin-top: 2px; }
.opp-tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.tag-qdii { background: rgba(56,189,248,0.12); color: var(--accent); border: 1px solid rgba(56,189,248,0.2); }
.tag-lof { background: rgba(129,140,248,0.12); color: var(--accent2); border: 1px solid rgba(129,140,248,0.2); }
.tag-close { background: rgba(251,191,36,0.12); color: var(--orange); border: 1px solid rgba(251,191,36,0.2); }
.opp-pct { font-size: 26px; font-weight: 800; line-height: 1; min-width: 90px; text-align: right; }
.opp-pct.prem { color: var(--red); }
.opp-pct.disc { color: var(--green); }
.opp-pct.clos { color: var(--orange); }

.opp-btm { display: flex; gap: 12px; flex-wrap: wrap; }
.opp-meta { font-size: 12px; color: var(--muted); line-height: 1.7; flex: 1; min-width: 180px; }
.opp-meta b { color: var(--text); font-weight: 600; }
.opp-action { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: 600; align-self: flex-start; }
.action-prem { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.action-disc { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.action-clos { background: rgba(251,191,36,0.1); color: var(--orange); border: 1px solid rgba(251,191,36,0.2); }

/* ===== 分组 ===== */
.group-title { display: flex; align-items: center; gap: 8px; margin: 18px 0 10px; font-size: 13px; font-weight: 600; color: var(--text); }
.group-count { font-size: 11px; background: rgba(56,189,248,0.1); color: var(--accent); padding: 1px 7px; border-radius: 20px; font-weight: 500; }

/* ===== 逆回购 ===== */
.intl-card .idx-card { border-color: rgba(251,191,36,0.12); }
.intl-card .idx-card:hover { border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.05); }
.repo-banner {
  background: linear-gradient(135deg, rgba(56,189,248,0.08), rgba(129,140,248,0.05));
  border: 1px solid rgba(56,189,248,0.2);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 12px;
}
.repo-banner.high-alert {
  background: linear-gradient(135deg, rgba(251,191,36,0.12), rgba(248,113,113,0.08));
  border-color: rgba(251,191,36,0.3);
  animation: alertPulse 2s infinite;
}
.repo-top { display: flex; align-items: center; justify-content: space-between; }
.repo-rates { display: flex; gap: 20px; align-items: baseline; }
.repo-main { font-size: 28px; font-weight: 800; color: var(--accent); }
.repo-note { font-size: 12px; color: var(--muted); }
.repo-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
.repo-badge.normal { background: rgba(56,189,248,0.1); color: var(--accent); }
.repo-badge.high { background: rgba(251,191,36,0.15); color: var(--orange); }

/* ===== 可转债 ===== */
.cb-card { margin-bottom: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; transition: border-color 0.2s; }
.cb-card:hover { border-color: var(--border2); }
.cb-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.cb-name { font-size: 14px; font-weight: 600; }
.cb-tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
.cb-due { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.cb-soon { background: rgba(251,191,36,0.1); color: var(--orange); border: 1px solid rgba(251,191,36,0.2); }
.cb-future { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.cb-info { font-size: 12px; color: var(--muted); line-height: 1.7; }
.cb-foot { font-size: 11px; color: var(--muted); margin-top: 6px; padding: 6px 10px; background: rgba(56,189,248,0.04); border-radius: 6px; }

/* ===== 空状态 ===== */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ===== 底部 ===== */
.footer { text-align: center; padding: 24px 0 40px; color: var(--muted); font-size: 11px; line-height: 2; border-top: 1px solid var(--border); margin-top: 24px; }

/* ===== 动画 ===== */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes alertPulse { 0%,100%{box-shadow: 0 0 0 0 rgba(251,191,36,0)} 50%{box-shadow: 0 0 20px 4px rgba(251,191,36,0.15)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.animate { animation: fadeIn 0.4s ease both; }
.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.1s; }
.stagger-3 { animation-delay: 0.15s; }

/* ===== 加载 ===== */
.skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.02) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ===== 工具 ===== */
.flex { display: flex; }
.items-center { align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.mt-4 { margin-top: 4px; }
.mb-12 { margin-bottom: 12px; }
</style>
</head>

<script>
const REPO_HIGH = 3.0;

// ===== 工具函数 =====
const $ = id => document.getElementById(id);
function fmt(n, d = 2) { return n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(d) + '%'; }
function pctColor(v) { return v >= 0 ? 'up' : 'dn'; }
function amountFmt(v) {
  if (v == null) return '—';
  return v >= 10000 ? (v / 10000).toFixed(1) + '亿' : Math.round(v) + '万';
}

// ===== 加载所有数据 =====
async function load() {
  renderRepoLive();
  await Promise.allSettled([renderIndices(), renderArb(), renderCB()]);
  $('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false }) + ' ✓';
}

// ===== 大盘指数（直接从腾讯实时拉取） =====
async function renderIndices() {
  const el = $('indicesGrid');
  const intlEl = $('intlGrid');

  // 腾讯API代码（已验证有效）
  // A股: sh000001=上证 sh000300=沪深300 sh000688=科创50 sz399001=深证 sz399006=创业板
  // 国际: usIXIC=纳斯达克 usDJI=道琼斯 usNDX=纳指100 hkHSI=恒生 hkHSCEI=恒生国企
  const codes = ['sh000001','sh000300','sh000688','sz399001','sz399006',
                 'usIXIC','usDJI','usNDX','hkHSI','hkHSCEI'];
  const nameMap = {
    'sh000001': '上证指数', 'sh000300': '沪深300', 'sh000688': '科创50',
    'sz399001': '深证成指', 'sz399006': '创业板指',
    'usIXIC': '纳斯达克', 'usDJI': '道琼斯', 'usNDX': '纳指100',
    'hkHSI': '恒生指数', 'hkHSCEI': '恒生国企'
  };
  const marketMap = {
    'sh000001': 'A股','sh000300': 'A股','sh000688': 'A股',
    'sz399001': 'A股','sz399006': 'A股',
    'usIXIC': '美国','usDJI': '美国','usNDX': '美国',
    'hkHSI': '香港','hkHSCEI': '香港'
  };

  try {
    const r = await fetch('https://qt.gtimg.cn/q=' + codes.join(','));
    const txt = await r.text();
    const result = {};

    txt.split('\n').forEach(line => {
      if (!line || !line.includes('~')) return;
      const parts = line.split('~');
      if (parts.length < 4) return;
      const price = parseFloat(parts[3]);
      if (!price || price <= 0) return;
      // 腾讯 raw key: "v_sh000001="1 → rawKey=sh000001=1 → code=sh000001（去=及后面内容，保留sh/sz前缀）
      const rawKey = parts[0].replace(/"/g,'').replace('v_','');
      const code = rawKey.replace(/=[^&]*/,'');
      if (!code || !nameMap[code]) return;
      result[code] = {
        price,
        change: parts[32] || '0',
        name: nameMap[code]
      };
    });

    const cn = [];
    const intl = [];
    Object.entries(result).forEach(([code, d]) => {
      if (!d.price) return;
      const change = parseFloat(d.change) || 0;
      const pct = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
      const item = { code, name: d.name, price: d.price.toLocaleString('en', {minimumFractionDigits: 2}), change: d.change, pct };
      if (marketMap[code] === 'A股') cn.push(item);
      else intl.push(item);
    });

    $('idxCount').textContent = cn.length + ' 个';
    $('intlCount').textContent = intl.length + ' 个';

    function idxCard(idx, isIntl) {
      const c = parseFloat(idx.change) || 0;
      const cls = c >= 0 ? 'up' : 'dn';
      const sign = c >= 0 ? '▲' : '▼';
      return `<div class="idx-card">
        <div class="idx-name">${isIntl ? '🌏 ' : ''}${idx.name}</div>
        <div class="idx-price">${idx.price}</div>
        <div class="idx-change ${cls}">${sign} ${idx.change} (${idx.pct})</div>
      </div>`;
    }

    el.innerHTML = cn.length
      ? cn.map(i => idxCard(i, false)).join('')
      : '<div class="empty" style="grid-column:1/-1">暂无A股数据</div>';

    intlEl.innerHTML = intl.length
      ? intl.map(i => idxCard(i, true)).join('')
      : '<div class="empty" style="grid-column:1/-1">暂无国际数据</div>';

  } catch (e) {
    el.innerHTML = '<div class="empty" style="grid-column:1/-1">指数加载失败</div>';
    intlEl.innerHTML = '<div class="empty" style="grid-column:1/-1">—</div>';
  }
}

// ===== 套利机会 =====
async function renderArb() {
  try {
    const r = await fetch('./data/arb.json', { cache: 'no-cache' });
    if (!r.ok) throw new Error('http ' + r.status);
    const d = await r.json();
    const list = d.opportunities || [];
    const s = d.summary || {};

    // 统计
    $('scanInfo').textContent = `扫描 ${s.scanned || 0} 只 · ${d.updated || ''}`;
    $('sTotal').textContent    = s.total || 0;
    $('sPremium').textContent  = s.premium || 0;
    $('sDiscount').textContent = s.discount || 0;
    $('sClose').textContent    = s.close || 0;

    // 逆回购
    if (d.repo) {
      const { gc001, r001 } = d.repo;
      if (gc001 != null) {
        $('repoGC').textContent = gc001.toFixed(2) + '%';
        $('repoR0').innerHTML   = r001 != null ? `<b style="color:var(--accent)">${r001.toFixed(2)}%</b>` : '—';
        const high = gc001 >= REPO_HIGH || (r001 != null && r001 >= REPO_HIGH);
        const badge = $('repoBadge');
        badge.textContent = high ? '⚠️ 利率走高' : '✓ 正常';
        badge.className   = 'repo-badge ' + (high ? 'high' : 'normal');
        $('repoNote').textContent = high
          ? '⚠️ GC001利率高于' + REPO_HIGH + '%，可考虑参与逆回购'
          : '利率处于正常区间，可继续观望';
        const banner = $('repoBox').querySelector('.repo-banner');
        if (banner) banner.className = 'repo-banner' + (high ? ' high-alert' : '');
      }
    }

    if (!list.length) {
      $('oppList').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">今日无 ≥5% 套利机会，保持关注 🔭</div></div>';
      return;
    }

    // 分组
    const groups = [
      { key: 'qdii',  label: '🌐 QDII / 跨境基金' },
      { key: 'lof',   label: '📦 国内 LOF' },
      { key: 'close', label: '🔒 封闭 / 定开基金' }
    ];

    let html = '';
    groups.forEach(g => {
      const items = list.filter(o => o.type === g.key);
      if (!items.length) return;
      html += `<div class="group-title">${g.label}<span class="group-count">${items.length}</span></div>`;
      items.forEach(o => html += oppCard(o));
    });
    $('oppList').innerHTML = html;
  } catch (e) {
    $('oppList').innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">数据加载失败，稍后重试</div></div>';
  }
}

function oppCard(o) {
  const typeMap = { qdii: 'tag-qdii', lof: 'tag-lof', close: 'tag-close' };
  const typeTxt = { qdii: 'QDII', lof: 'LOF', close: '封闭' };
  const dirMap  = { premium: 'prem', discount: 'disc', close: 'clos' };
  const actMap  = { premium: 'action-prem', discount: 'action-disc', close: 'action-clos' };
  const actTxt  = { premium: '申购+卖出', discount: '买入+赎回', close: '持有到期' };
  const pPct    = (o.premiumPct >= 0 ? '+' : '') + o.premiumPct.toFixed(2) + '%';
  const navD   = (o.navDate || '').replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
  const amt    = amountFmt(o.amountWan);
  const cls    = dirMap[o.dir] || 'prem';

  return `<div class="opp-card ${o.dir}">
    <div class="opp-top">
      <div class="opp-name">
        <div class="opp-name-text" title="${o.name}">${o.name}</div>
        <div class="opp-code">${o.code}</div>
      </div>
      <span class="opp-tag ${typeMap[o.type] || 'tag-lof'}">${typeTxt[o.type] || 'LOF'}</span>
      <div class="opp-pct ${cls}">${pPct}</div>
    </div>
    <div class="opp-btm">
      <div class="opp-meta">
        现价 <b>${o.price != null ? o.price.toFixed(3) : '—'}</b> ·
        净值 <b>${o.nav != null ? o.nav.toFixed(4) : '—'}</b>${navD && navD !== '—' ? ' (' + navD + ')' : ''}<br>
        预估空间 <b class="${o.space >= 0 ? 'up' : 'dn'}">${o.space >= 0 ? '+' : ''}${o.space.toFixed(2)}%</b> ·
        成交 ${amt} ·
        ${o.time ? '时间 ' + o.time.slice(-5) : ''}
      </div>
      <div class="opp-action ${actMap[o.dir] || 'action-prem'}">${actTxt[o.dir] || o.action}</div>
    </div>
  </div>`;
}

// ===== 逆回购实时(JS端补一次) =====
async function renderRepoLive() {
  try {
    const r = await fetch('https://qt.gtimg.cn/q=sh204001,sz131810');
    const txt = await r.text();
    const rates = {};
    txt.split('\n').forEach(line => {
      if (!line || !line.includes('~')) return;
      const parts = line.split('~');
      if (parts.length < 4) return;
      const rawKey = parts[0].replace(/"/g,'').replace('v_','');
      const code = rawKey.replace(/=[^&]*/,'');
      const price = parseFloat(parts[3]);
      if (!price || price <= 0) return;
      if (code === 'sh204001') rates.gc001 = price;
      if (code === 'sz131810') rates.r001 = price;
    });
    if (rates.gc001 == null) return;
    $('repoGC').textContent = rates.gc001.toFixed(2) + '%';
    $('repoR0').innerHTML   = rates.r001 != null
      ? `<b style="color:var(--accent)">${rates.r001.toFixed(2)}%</b>`
      : '—';
    const high = rates.gc001 >= REPO_HIGH || (rates.r001 != null && rates.r001 >= REPO_HIGH);
    const badge = $('repoBadge');
    badge.textContent = high ? '⚠️ 利率偏高' : '✓ 正常';
    badge.className   = 'repo-badge ' + (high ? 'high' : 'normal');
    $('repoNote').textContent = high
      ? '⚠️ GC001 > ' + REPO_HIGH + '%，闲置资金可考虑参与逆回购'
      : '利率处于正常区间，可继续观望';
    const banner = $('repoBox').querySelector('.repo-banner');
    if (banner) banner.className = 'repo-banner' + (high ? ' high-alert' : '');
  } catch (e) {}
}

// ===== 待发可转债 =====
async function renderCB() {
  try {
    const r = await fetch('./data/cb_upcoming.json', { cache: 'no-cache' });
    if (!r.ok) throw new Error('http ' + r.status);
    const data = await r.json();
    const list = (data && data.list) || [];
    $('cbUpdated').textContent = data.updated ? ('更新：' + data.updated) : '';
    if (!list.length) {
      $('cbList').innerHTML = '<div class="empty"><div class="empty-icon">🎉</div><div class="empty-text">近期无新债申购，继续关注 🎉</div></div>';
      return;
    }
    const now = new Date();
    let html = '';
    list.forEach(b => {
      const d = b.subDate ? new Date(b.subDate.replace(/-/g, '/')) : null;
      const diff = d ? Math.round((d - now) / 86400000) : null;
      let tag = '', cls = 'cb-future';
      if (diff === 0) { tag = '今日申购'; cls = 'cb-due'; }
      else if (diff === 1) { tag = '明日申购'; cls = 'cb-soon'; }
      else if (diff > 1) { tag = diff + '天后'; cls = 'cb-future'; }
      else { tag = '已截止'; cls = 'cb-due'; }
      html += `<div class="cb-card">
        <div class="cb-hd">
          <span class="cb-name">${b.name}</span>
          <span class="cb-code" style="font-size:11px;color:var(--muted)">${b.code}</span>
          <span class="cb-tag ${cls}">${tag}</span>
        </div>
        <div class="cb-info">正股: ${b.stock || '—'} · 规模: ${b.scale ? b.scale + '亿' : '—'} · 评级: ${b.rating || '—'}${b.value ? ' · 转股价值: ' + b.value : ''}</div>
        <div class="cb-foot">📅 申购日: ${(b.subDate || '—').slice(0,10)} · 顶格申购 · 无需预缴款</div>
      </div>`;
    });
    $('cbList').innerHTML = html;
  } catch (e) {
    $('cbList').innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">数据加载失败</div></div>';
  }
}
